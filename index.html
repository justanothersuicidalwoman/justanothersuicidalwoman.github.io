<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        /* Base styling for the maroon background */
        body {
            background-color: #800000;
            margin: 0;
            padding: 40px 20px;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Paper collage clipping effect */
        .clipping {
            background-color: #ffffff;
            padding: 10px;
            box-shadow: 2px 4px 10px rgba(0, 0, 0, 0.4);
            display: inline-block;
            transition: transform 0.2s ease;
        }
        
        /* Interactive items slightly lift up when hovered */
        a.clipping:hover {
            transform: scale(1.05) rotate(1deg);
        }

        /* Top Header Section (Name 2 - Portrait - Name 1) */
        .header-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 80px;
        }

        .portrait-box img {
            max-width: 200px;
            height: auto;
            border-radius: 4px;
        }

        .name-box img {
            max-width: 150px;
            height: auto;
        }

        /* Projects Section Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 60px 80px; 
            max-width: 800px;
            width: 100%;
            justify-items: center;
            margin-bottom: 100px;
        }

        .project-item img {
            max-width: 180px;
            height: auto;
        }

        /* Bottom Contact Section */
        .contact-footer {
            margin-top: auto; 
        }

        .contact-footer img {
            max-width: 100px; 
            height: auto;
        }
    </style>
</head>
<body>

    <div class="header-row">
        <div class="clipping name-box">
            <img src="name 2.jpg" alt="Name Left">
        </div>
        
        <div class="clipping portrait-box">
            <img src="portait.jpg" alt="My Portrait">
        </div>
        
        <div class="clipping name-box">
            <img src="name 1.jpg" alt="Name Right">
        </div>
    </div>

    <div class="projects-grid">
        <a href="#" class="clipping project-item">
            <img src="title 1.jpg" alt="Project Title 1">
        </a>
        <a href="#" class="clipping project-item">
            <img src="title 2.jpg" alt="Project Title 2">
        </a>
        <a href="#" class="clipping project-item">
            <img src="title 3.jpg" alt="Project Title 3">
        </a>
        <a href="#" class="clipping project-item">
            <img src="title 4.jpg" alt="Project Title 4">
        </a>
    </div>

    <div class="contact-footer">
        <a href="#" class="clipping">
            <img src="cantact.jpg" alt="Contact Info">
        </a>
    </div>

</body>
</html>
