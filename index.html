<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zahra Mohseni</title>
    <style>
        /* Base styling for the maroon background */
        body {
            background-color: #800000;
            margin: 0;
            padding: 60px 40px;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden; /* Prevents side scrolling if names push far */
        }

        /* REMOVED WHITE MARGIN: 
           The white background and padding are gone. 
           Only the raw photos remain floating on maroon.
        */
        .clipping {
            display: inline-block;
            transition: transform 0.2s ease;
        }
        
        /* Interactive items still slightly lift up when hovered */
        a.clipping:hover {
            transform: scale(1.05);
        }

        /* Top Header Section (Names pushed to the far corners) */
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Pushes names to the absolute edges */
            width: 100%;
            max-width: 1400px; /* Wider container to allow corners behavior */
            margin-bottom: 100px;
        }

        /* Portrait size remains good */
        .portrait-box img {
            max-width: 200px;
            height: auto;
            border-radius: 4px;
        }

        /* Names are now DOUBLE size (approx 300px max instead of 150px) */
        .name-box img {
            max-width: 300px;
            height: auto;
        }

        /* Titles Section changed to a vertical list (one after another) */
        .projects-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 80px; /* Generous spacing between each listed item */
            width: 100%;
            margin-bottom: 120px;
        }

        /* Titles are now THREE TIMES bigger (approx 540px max instead of 180px) */
        .project-item img {
            max-width: 540px;
            height: auto;
        }

        /* Bottom Contact Section */
        .contact-footer {
            margin-top: auto; 
        }

        /* Contact is now DOUBLE size (200px max instead of 100px) */
        .contact-footer img {
            max-width: 200px; 
            height: auto;
        }
        /* MOBILE PREPARATION: This triggers only on screens smaller than 768px wide */
        @media (max-width: 768px) {
            body {
                padding: 30px 15px; /* Less padding on the edges of the phone */
            }

            /* Stack Name-Portrait-Name vertically instead of side-by-side */
            .header-row {
                flex-direction: column;
                gap: 20px;
                margin-bottom: 50px;
            }

            /* Make the names slightly smaller so they fit nicely on a phone screen */
            .name-box img {
                max-width: 200px;
            }

            /* Automatically scale the big titles down so they never exceed phone width */
            .project-item img {
                max-width: 100%;
                height: auto;
            }

            /* Make the spaced list slightly tighter for easier scrolling on phones */
            .projects-list {
                gap: 50px;
                margin-bottom: 70px;
            }
        }
        /* Subtle Copyright Styling */
        .copyright {
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.6; /* Makes it a soft, elegant muted color */
            margin-top: 60px;
            margin-bottom: 20px;
            width: 100%;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header-row">
        <div class="clipping name-box">
            <img src="name 2.jpg" alt="Name Left">
        </div>
        
        <div class="clipping portrait-box">
            <img src="portait.jpg" alt="My Portrait">
        </div>
        
        <div class="clipping name-box">
            <img src="name 1.jpg" alt="Name Right">
        </div>
    </div>

    <div class="projects-list">
        <a href="the-mystery.html" class="clipping project-item">
            <img src="title 1.jpg" alt="The Mystery">
        </a>
        <a href="the-excluded-middle.html" class="clipping project-item">
            <img src="title 2.jpg" alt="The Excluded Middle">
        </a>
        <a href="windows-project.html" class="clipping project-item">
            <img src="title 3.jpg" alt="Windows Project">
        </a>
        <a href="careless-critique.html" class="clipping project-item">
            <img src="title 4.jpg" alt="Careless Critique">
        </a>
    </div>

    <div class="contact-footer">
        <a href="contact.html" class="clipping">
            <img src="contact.jpg" alt="Contact">
        </a>
    </div>
<div class="copyright">
        all rights reserved Zahra Mohseni © 2026
    </div>
</body>
</html>
